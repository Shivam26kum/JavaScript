<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loops in JavaScript</title>
</head>
<body>
    <h1>Loops in JavaScript</h1>

    <script>
        // For Loop
        console.log("For Loop:");
        for (let i = 0; i < 5; i++) {
            console.log("Iteration:", i);
        }
    </script>
    
</body>
</html>

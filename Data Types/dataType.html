<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Types in JavaScript</title>
</head>
<body>

    <h1>Data Types in JavaScript</h1>

    <script>
        // String data type
        let name = "Shivam";
        console.log("Name:", name);

        // Number data type
        let age = 20;
        console.log("Age:", age);

        // Boolean data type
        let isStudent = true;
        console.log("Is Student:", isStudent);

        // Null data type
        let emptyValue = null;
        console.log("Empty Value:", emptyValue);

        // Undefined data type
        let notDefined;
        console.log("Not Defined:", notDefined);

        // Object data type
        let person = {
            firstName: "Shivam",
            lastName: "Kumar",
            age: 20
        };
        console.log("Person Object:", person);

        // Array data type
        let numbers = [1, 2, 3, 4, 5];
        console.log("Numbers Array:", numbers);
    </script>
    
</body>
</html>

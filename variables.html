<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables in JavaScript</title>
</head>
<body>
    <h1>Variables in JavaScript</h1>


    <script>
        // Decraring a variable using var
        var name = "Shivam";

        console.log("Name:", name);
        alert("Name: " + name);

        // Decraring a variable using let
        let age = 20;
        console.log("Age:", age);

        // Decraring a variable using const
        const country = "India";
        console.log("Country:", country);
        
    </script>
</body>
</html>

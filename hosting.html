<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hosting in JavaScript</title>
</head>
<body>
    <h1>Hosting in JavaScript</h1>
    <script>
        // Example of variable hosting
        console.log(myVar); // undefined (not an error)
        var myVar = "Hello, World!";
        console.log(myVar); // "Hello, World!"

        // Example of function hosting
        greet(); // "Hello, Shivam!"
        function greet() {
            console.log("Hello, Shivam!");
        }

        greet(); // "Hello, Shivam!"
    </script>
</body>
</html>
